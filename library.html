<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library — Baite Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1efe1;
    --accent: #1A1A1A;
    --text-dim: #444444;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--accent);
    overflow: hidden;
    height: 100%;
    width: 100%;
  }

  /* NAVBAR */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: var(--bg);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
  }
  .navbar-logo {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
    text-decoration: none;
  }
  .navbar-center {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  .navbar-center:hover { color: var(--accent); }
  .navbar-cta {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 10px 24px;
    border-radius: 60px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .navbar-cta:hover {
    transform: scale(1.03) translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
  }
  .navbar-cta:active { transform: scale(0.98); }

  /* WATERMARK */
  .watermark {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
    pointer-events: none;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: clamp(6rem, 18vw, 18rem);
    color: rgba(26, 26, 26, 0.04);
    letter-spacing: -0.03em;
    text-transform: uppercase;
    user-select: none;
  }

  /* VIEWPORT + CANVAS */
  #viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 1;
    cursor: grab;
  }
  #viewport.is-dragging { cursor: grabbing; }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    will-change: transform;
  }

  /* CARD WRAP + CARD */
  .card-wrap {
    position: absolute;
  }
  .card {
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(0.34, 2.2, 0.64, 1);
  }
  .card:hover {
    transform: scale(1.04) rotate(0deg);
  }

  /* MOBILE */
  @media (max-width: 767px) {
    .navbar-center { display: none; }
    .navbar { padding: 0 20px; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-logo">Baite Studio</a>
  <a href="index.html" class="navbar-center">Home</a>
  <a href="#" class="navbar-cta">Apply Now</a>
</nav>

<div class="watermark">LIBRARY</div>

<div id="viewport">
  <div id="canvas"></div>
</div>

<script>
  var TILE_W = 2200;
  var TILE_H = 1600;

  var cardDefs = [
    // Row 1
    { bx: 100,  by: 60,   w: 110, h: 130, rot: -2 },
    { bx: 480,  by: 40,   w: 150, h: 170, rot: 1.5 },
    { bx: 900,  by: 80,   w: 120, h: 140, rot: -1 },
    { bx: 1300, by: 50,   w: 130, h: 150, rot: 2 },
    { bx: 1750, by: 70,   w: 110, h: 130, rot: -1.5 },
    // Row 2
    { bx: 200,  by: 340,  w: 140, h: 160, rot: 1 },
    { bx: 650,  by: 320,  w: 170, h: 190, rot: -2.5 },
    { bx: 1100, by: 350,  w: 115, h: 135, rot: 2 },
    { bx: 1550, by: 330,  w: 150, h: 170, rot: -1 },
    { bx: 1950, by: 360,  w: 120, h: 140, rot: 1.5 },
    // Row 3
    { bx: 80,   by: 620,  w: 160, h: 180, rot: -1 },
    { bx: 520,  by: 600,  w: 130, h: 150, rot: 2.5 },
    { bx: 950,  by: 640,  w: 110, h: 130, rot: -2 },
    { bx: 1400, by: 610,  w: 140, h: 160, rot: 1 },
    { bx: 1850, by: 630,  w: 135, h: 155, rot: -1.5 },
    // Row 4
    { bx: 250,  by: 900,  w: 150, h: 170, rot: 1.5 },
    { bx: 700,  by: 880,  w: 120, h: 145, rot: -2 },
    { bx: 1150, by: 910,  w: 170, h: 190, rot: 1 },
    { bx: 1600, by: 890,  w: 110, h: 130, rot: -2.5 },
    { bx: 2000, by: 920,  w: 130, h: 150, rot: 2 },
    // Row 5
    { bx: 100,  by: 1180, w: 120, h: 140, rot: -1 },
    { bx: 550,  by: 1160, w: 160, h: 180, rot: 2 },
    { bx: 1000, by: 1200, w: 115, h: 135, rot: -1.5 },
    { bx: 1450, by: 1170, w: 150, h: 170, rot: 3 },
  ];

  var canvasEl = document.getElementById('canvas');
  var viewportEl = document.getElementById('viewport');

  var cards = cardDefs.map(function (def, i) {
    var wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.style.width = def.w + 'px';
    wrap.style.height = def.h + 'px';
    wrap.style.transform = 'rotate(' + def.rot + 'deg)';

    var inner = document.createElement('div');
    inner.className = 'card';
    inner.addEventListener('click', function () {
      console.log('card ' + (i + 1) + ' clicked');
    });

    wrap.appendChild(inner);
    canvasEl.appendChild(wrap);

    return { el: wrap, bx: def.bx, by: def.by, tileCol: 0, tileRow: 0 };
  });

  function updateCardPosition(c) {
    c.el.style.left = (c.bx + c.tileCol * TILE_W) + 'px';
    c.el.style.top = (c.by + c.tileRow * TILE_H) + 'px';
  }

  // Center cards around viewport on init
  var initVW = window.innerWidth;
  var initVH = window.innerHeight;
  cards.forEach(function (c) {
    c.tileCol = Math.round((initVW / 2 - c.bx) / TILE_W);
    c.tileRow = Math.round((initVH / 2 - c.by) / TILE_H);
    updateCardPosition(c);
  });

  // --- State ---
  var parallaxTarget = { x: 0, y: 0 };
  var parallaxCurrent = { x: 0, y: 0 };
  var dragTarget = { x: 0, y: 0 };
  var dragCurrent = { x: 0, y: 0 };
  var velocity = { x: 0, y: 0 };

  var isDragging = false;
  var startDragX = 0, startDragY = 0;
  var dragOffsetAtStart = { x: 0, y: 0 };
  var prevDragCurrent = { x: 0, y: 0 };

  function lerp(a, b, t) { return a + (b - a) * t; }

  // --- Mouse parallax ---
  document.addEventListener('mousemove', function (e) {
    if (!isDragging) {
      parallaxTarget.x = (e.clientX - window.innerWidth / 2) * 0.08;
      parallaxTarget.y = (e.clientY - window.innerHeight / 2) * 0.08;
    }
    if (isDragging) {
      dragTarget.x = dragOffsetAtStart.x + (e.clientX - startDragX);
      dragTarget.y = dragOffsetAtStart.y + (e.clientY - startDragY);
    }
  });

  // --- Wheel scroll (slowed 20%) ---
  window.addEventListener('wheel', function (e) {
    e.preventDefault();
    velocity.x -= e.deltaX * 0.42;
    velocity.y -= e.deltaY * 0.42;
    var MAX_VEL = 25;
    velocity.x = Math.max(-MAX_VEL, Math.min(MAX_VEL, velocity.x));
    velocity.y = Math.max(-MAX_VEL, Math.min(MAX_VEL, velocity.y));
  }, { passive: false });

  // --- Mouse drag ---
  viewportEl.addEventListener('mousedown', function (e) {
    isDragging = true;
    viewportEl.classList.add('is-dragging');
    startDragX = e.clientX;
    startDragY = e.clientY;
    dragOffsetAtStart.x = dragTarget.x;
    dragOffsetAtStart.y = dragTarget.y;
    velocity.x = 0;
    velocity.y = 0;
    prevDragCurrent.x = dragCurrent.x;
    prevDragCurrent.y = dragCurrent.y;
  });

  document.addEventListener('mouseup', function () {
    if (!isDragging) return;
    isDragging = false;
    viewportEl.classList.remove('is-dragging');
    velocity.x = (dragCurrent.x - prevDragCurrent.x) * 0.4;
    velocity.y = (dragCurrent.y - prevDragCurrent.y) * 0.4;
  });

  // --- Touch ---
  viewportEl.addEventListener('touchstart', function (e) {
    var t = e.touches[0];
    isDragging = true;
    viewportEl.classList.add('is-dragging');
    startDragX = t.clientX;
    startDragY = t.clientY;
    dragOffsetAtStart.x = dragTarget.x;
    dragOffsetAtStart.y = dragTarget.y;
    velocity.x = 0;
    velocity.y = 0;
    prevDragCurrent.x = dragCurrent.x;
    prevDragCurrent.y = dragCurrent.y;
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    e.preventDefault();
    if (!isDragging) return;
    var t = e.touches[0];
    dragTarget.x = dragOffsetAtStart.x + (t.clientX - startDragX);
    dragTarget.y = dragOffsetAtStart.y + (t.clientY - startDragY);
  }, { passive: false });

  document.addEventListener('touchend', function () {
    if (!isDragging) return;
    isDragging = false;
    viewportEl.classList.remove('is-dragging');
    velocity.x = (dragCurrent.x - prevDragCurrent.x) * 0.4;
    velocity.y = (dragCurrent.y - prevDragCurrent.y) * 0.4;
  });

  // --- Wrap cards (when 200px past viewport edge) ---
  function wrapCards(fx, fy) {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      var screenX = c.bx + c.tileCol * TILE_W + fx;
      var screenY = c.by + c.tileRow * TILE_H + fy;

      if (screenX < -600) { c.tileCol++; updateCardPosition(c); }
      else if (screenX > vw + 600) { c.tileCol--; updateCardPosition(c); }

      if (screenY < -600) { c.tileRow++; updateCardPosition(c); }
      else if (screenY > vh + 600) { c.tileRow--; updateCardPosition(c); }
    }
  }

  // --- rAF loop ---
  function tick() {
    prevDragCurrent.x = dragCurrent.x;
    prevDragCurrent.y = dragCurrent.y;

    parallaxCurrent.x = lerp(parallaxCurrent.x, parallaxTarget.x, 0.06);
    parallaxCurrent.y = lerp(parallaxCurrent.y, parallaxTarget.y, 0.06);

    dragTarget.x += velocity.x;
    dragTarget.y += velocity.y;
    velocity.x *= 0.78;
    velocity.y *= 0.78;
    var MAX_VEL = 25;
    velocity.x = Math.max(-MAX_VEL, Math.min(MAX_VEL, velocity.x));
    velocity.y = Math.max(-MAX_VEL, Math.min(MAX_VEL, velocity.y));

    dragCurrent.x = lerp(dragCurrent.x, dragTarget.x, 0.10);
    dragCurrent.y = lerp(dragCurrent.y, dragTarget.y, 0.10);

    var fx = parallaxCurrent.x + dragCurrent.x;
    var fy = parallaxCurrent.y + dragCurrent.y;

    canvasEl.style.transform = 'translate(' + fx + 'px,' + fy + 'px)';
    wrapCards(fx, fy);

    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
